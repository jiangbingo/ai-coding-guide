# Prometheus 告警规则

groups:
- name: container-resource-alerts
  rules:
  # CPU 相关告警

  - alert: PodCPUThrottlingHigh
    expr: |
      rate(container_cpu_cfs_throttled_seconds_total{container!=""}[5m])
      /
      rate(container_cpu_cfs_seconds_total{container!=""}[5m])
      > 0.25
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Pod CPU 节流过高"
      description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU 节流率 {{ $value | humanizePercentage }}，超过 25%"

  - alert: PodCPUUsageHigh
    expr: |
      rate(container_cpu_usage_seconds_total{container!=""}[5m])
      /
      on(namespace, pod) group_left
      kube_pod_container_resource_limits{resource="cpu"}
      > 0.9
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Pod CPU 使用率过高"
      description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU 使用率 {{ $value | humanizePercentage }}，超过 90%"

  # 内存相关告警

  - alert: PodMemoryUsageHigh
    expr: |
      container_memory_working_set_bytes{container!=""}
      /
      on(namespace, pod) group_left
      kube_pod_container_resource_limits{resource="memory"}
      > 0.9
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Pod 内存使用率过高"
      description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 内存使用率 {{ $value | humanizePercentage }}，超过 90%，有 OOM 风险"

  - alert: PodMemoryUsageCritical
    expr: |
      container_memory_working_set_bytes{container!=""}
      /
      on(namespace, pod) group_left
      kube_pod_container_resource_limits{resource="memory"}
      > 0.95
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Pod 内存使用率严重"
      description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 内存使用率 {{ $value | humanizePercentage }}，超过 95%，即将 OOM"

  - alert: PodOOMKilled
    expr: |
      increase(kube_pod_container_status_terminated_reason{reason="OOMKilled"}[5m]) > 0
    labels:
      severity: critical
    annotations:
      summary: "Pod 被 OOM Kill"
      description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 容器 {{ $labels.container }} 因 OOM 被终止"

  - alert: ContainerMemoryGrowth
    expr: |
      (
        container_memory_working_set_bytes{container!=""}
        -
        container_memory_working_set_bytes{container!=""} offset 1h
      )
      /
      container_memory_working_set_bytes{container!=""} offset 1h
      > 0.5
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: "容器内存增长过快"
      description: "容器 {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} 内存在过去 1 小时增长了 {{ $value | humanizePercentage }}，可能存在内存泄漏"

  # 节点相关告警

  - alert: NodeMemoryPressure
    expr: |
      kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "节点内存压力"
      description: "节点 {{ $labels.node }} 处于内存压力状态"

  - alert: NodeDiskPressure
    expr: |
      kube_node_status_condition{condition="DiskPressure",status="true"} == 1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "节点磁盘压力"
      description: "节点 {{ $labels.node }} 处于磁盘压力状态"

  - alert: NodeCPUUsageHigh
    expr: |
      100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "节点 CPU 使用率过高"
      description: "节点 {{ $labels.node }} CPU 使用率 {{ $value | humanize }}%，超过 85%"

  - alert: NodeMemoryUsageHigh
    expr: |
      (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "节点内存使用率过高"
      description: "节点 {{ $labels.node }} 内存使用率 {{ $value | humanize }}%，超过 85%"

  # 资源争抢告警

  - alert: CPUOvercommit
    expr: |
      sum(kube_pod_container_resource_limits{resource="cpu"})
      /
      sum(kube_node_status_allocatable{resource="cpu"})
      > 2
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "集群 CPU 超配严重"
      description: "集群 CPU 限制超配率 {{ $value | humanize }}，超过 2 倍，可能导致 CPU 争抢"

  - alert: MemoryOvercommit
    expr: |
      sum(kube_pod_container_resource_limits{resource="memory"})
      /
      sum(kube_node_status_allocatable{resource="memory"})
      > 1.5
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "集群内存超配严重"
      description: "集群内存限制超配率 {{ $value | humanize }}，超过 1.5 倍，可能导致 OOM"

  - alert: BestEffortPodsHigh
    expr: |
      count(kube_pod_info{qos_class="BestEffort"})
      /
      count(kube_pod_info)
      > 0.3
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "BestEffort Pod 比例过高"
      description: "集群中 BestEffort Pod 占比 {{ $value | humanizePercentage }}，超过 30%，资源隔离不足"

  # QoS 相关告警

  - alert: GuaranteedPodsLow
    expr: |
      count(kube_pod_info{qos_class="Guaranteed"})
      /
      count(kube_pod_info)
      < 0.1
      and
      count(kube_pod_info) > 20
    for: 1h
    labels:
      severity: info
    annotations:
      summary: "Guaranteed Pod 比例过低"
      description: "集群中 Guaranteed Pod 占比 {{ $value | humanizePercentage }}，低于 10%，关键业务可能受影响"

  # 调度相关告警

  - alert: PendingPods
    expr: |
      sum(kube_pod_status_phase{phase="Pending"}) > 5
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "大量 Pod 处于 Pending 状态"
      description: "有 {{ $value }} 个 Pod 处于 Pending 状态，可能资源不足或调度问题"

  - alert: PodEvicted
    expr: |
      increase(kube_pod_status_reason{reason="Evicted"}[5m]) > 0
    labels:
      severity: warning
    annotations:
      summary: "Pod 被驱逐"
      description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 被驱逐"

  # 资源碎片告警

  - alert: NodeResourceFragmentation
    expr: |
      (
        kube_node_status_allocatable{resource="cpu"}
        -
        sum(kube_pod_container_resource_requests{resource="cpu"}) by (node)
      )
      /
      kube_node_status_allocatable{resource="cpu"}
      < 0.1
      and
      kube_node_status_allocatable{resource="cpu"}
      -
      sum(kube_pod_container_resource_requests{resource="cpu"}) by (node)
      > 100
    for: 30m
    labels:
      severity: info
    annotations:
      summary: "节点资源碎片化"
      description: "节点 {{ $labels.node }} 资源碎片化，可用资源较少但无法调度大 Pod"

  # 容器重启告警

  - alert: ContainerRestartingFrequently
    expr: |
      increase(kube_pod_container_status_restarts_total[1h]) > 5
    labels:
      severity: warning
    annotations:
      summary: "容器频繁重启"
      description: "容器 {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} 在过去 1 小时重启了 {{ $value }} 次"

  # cgroups 相关告警

  - alert: CgroupOOMEvents
    expr: |
      increase(container_oom_events_total[5m]) > 0
    labels:
      severity: critical
    annotations:
      summary: "cgroup OOM 事件"
      description: "检测到 cgroup OOM 事件，容器可能因内存不足被终止"
