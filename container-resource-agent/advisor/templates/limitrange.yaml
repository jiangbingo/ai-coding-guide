apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: default
spec:
  limits:
  # 默认容器限制
  - type: Container
    # 默认 limits（如果没有设置）
    default:
      cpu: "500m"
      memory: "512Mi"
    # 默认 requests（如果没有设置）
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    # 最大限制
    max:
      cpu: "4"
      memory: "8Gi"
    # 最小限制
    min:
      cpu: "50m"
      memory: "64Mi"
    # Limit/Request 比例限制
    maxLimitRequestRatio:
      cpu: "3"      # Limit 最多是 Request 的 3 倍
      memory: "2"   # Limit 最多是 Request 的 2 倍

  # Pod 总限制
  - type: Pod
    max:
      cpu: "8"
      memory: "16Gi"

  # PVC 限制
  - type: PersistentVolumeClaim
    max:
      storage: "100Gi"
    min:
      storage: "1Gi"
