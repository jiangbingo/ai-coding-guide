apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
  namespace: default
spec:
  hard:
    # Pod 数量限制
    pods: "50"

    # CPU 资源限制
    requests.cpu: "10"
    limits.cpu: "20"

    # 内存资源限制
    requests.memory: "20Gi"
    limits.memory: "40Gi"

    # 存储资源限制
    requests.storage: "500Gi"
    persistentvolumeclaims: "20"

    # 对象数量限制
    count/configmaps: "50"
    count/secrets: "50"
    count/services: "20"
    count/services.loadbalancers: "2"
    count/services.nodeports: "10"

---
# 按 QoS 类别的配额
apiVersion: v1
kind: ResourceQuota
metadata:
  name: qos-quota
  namespace: default
spec:
  hard:
    pods: "50"
  scopeSelector:
    matchExpressions:
    - scopeName: PriorityClass
      operator: In
      values:
      - high-priority

---
# 限制 BestEffort Pod 数量
apiVersion: v1
kind: ResourceQuota
metadata:
  name: besteffort-quota
  namespace: default
spec:
  hard:
    pods: "10"
  scopes:
  - BestEffort

---
# 限制 Burstable Pod 资源
apiVersion: v1
kind: ResourceQuota
metadata:
  name: burstable-quota
  namespace: default
spec:
  hard:
    pods: "30"
    requests.cpu: "5"
    requests.memory: "10Gi"
    limits.cpu: "10"
    limits.memory: "20Gi"
  scopes:
  - Terminating
  - NotTerminating
